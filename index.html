<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#FBFBF7">
<title>DataSense — A Field Manual for Practical Machine Learning</title>
<link rel="stylesheet" href="fonts.css">
<style>
:root{
  --paper:#FBFBF7; --sheet:#FFFFFF; --grid:#E7EBEE; --rule:#D8DEE4;
  --ink:#1F2933; --ink-2:#5B6B7B; --ink-3:#8595A6;
  --cobalt:#2447C5; --cobalt-soft:#EBEFFC;
  --red:#D6402B; --red-soft:#FBEFED;
  --green:#008300; --green-soft:#EDF6ED;
  --hilite:#FFF3B0;
  --c0:#2a78d6; --c1:#eb6834; --query:#4a3aa7;
  --shadow:4px 4px 0 rgba(31,41,51,.10);
  --serif:'Zilla Slab',Rockwell,'Roboto Slab',serif;
  --sans:'IBM Plex Sans','Helvetica Neue',Arial,sans-serif;
  --mono:'IBM Plex Mono','SF Mono',Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--sans);color:var(--ink);line-height:1.6;min-height:100vh;
  background:
    linear-gradient(var(--grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid) 1px,transparent 1px),
    var(--paper);
  background-size:24px 24px;
}
#app{max-width:780px;margin:0 auto;padding:36px 20px 96px}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
button:focus-visible,a:focus-visible{outline:2px solid var(--cobalt);outline-offset:2px}
input[type=range]{accent-color:var(--cobalt)}
.ws-knobrow input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;height:34px;cursor:pointer}
.ws-knobrow input[type=range]::-webkit-slider-runnable-track{height:4px;background:var(--rule);border-radius:2px}
.ws-knobrow input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:3px;background:var(--cobalt);border:2px solid var(--ink);margin-top:-10px;box-shadow:2px 2px 0 rgba(31,41,51,.2)}
.ws-knobrow input[type=range]::-moz-range-track{height:4px;background:var(--rule);border-radius:2px}
.ws-knobrow input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:3px;background:var(--cobalt);border:2px solid var(--ink)}
.mono{font-family:var(--mono)}
.small{font-size:.85rem;color:var(--ink-2)}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---------- masthead ---------- */
.masthead{margin-bottom:34px}
.mast-rules{border-top:3px solid var(--ink);border-bottom:1px solid var(--ink);height:6px;margin-bottom:18px}
.mast-eyebrow{font-family:var(--mono);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--cobalt);display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
.masthead h1{font-family:var(--serif);font-weight:700;font-size:clamp(2.4rem,7vw,3.4rem);line-height:1.05;margin:10px 0 8px;text-wrap:balance}
.mast-sub{color:var(--ink-2);max-width:56ch}
.mast-sub b{color:var(--ink)}
.mast-foot{border-top:1px solid var(--ink);margin-top:18px;padding-top:8px;font-family:var(--mono);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3)}

/* ---------- contents / topics ---------- */
.sec-label{font-family:var(--mono);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-2);margin:30px 0 12px;display:flex;align-items:center;gap:12px}
.sec-label::after{content:"";flex:1;border-top:1px solid var(--rule)}
.topic{background:var(--sheet);border:1.5px solid var(--ink);border-radius:2px;box-shadow:var(--shadow);padding:22px 24px;margin-bottom:18px}
.topic-head{display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap}
.topic h3{font-family:var(--serif);font-weight:600;font-size:1.45rem}
.topic .t-index{font-family:var(--mono);font-size:.72rem;letter-spacing:.12em;color:var(--ink-3)}
.topic .t-desc{color:var(--ink-2);margin-top:2px;font-size:.95rem}
.toc{margin-top:16px;display:flex;flex-direction:column}
.toc-row{display:flex;align-items:baseline;gap:10px;width:100%;padding:11px 2px;text-align:left;border-top:1px dashed var(--rule)}
.toc-row:hover:not(:disabled) .toc-name{color:var(--cobalt)}
.toc-row:hover:not(:disabled) .toc-go{transform:translateX(3px)}
.toc-row:disabled{cursor:not-allowed;opacity:.5}
.toc-part{font-family:var(--mono);font-size:.78rem;color:var(--ink-3);min-width:60px}
.toc-name{font-family:var(--serif);font-weight:600;font-size:1.05rem;transition:color .12s}
.toc-dots{flex:1;border-bottom:2px dotted var(--rule);transform:translateY(-4px);min-width:24px}
.toc-meta{font-family:var(--mono);font-size:.78rem;color:var(--ink-2);white-space:nowrap}
.toc-go{color:var(--cobalt);font-weight:600;transition:transform .12s}
.topic.locked{border-style:dashed;box-shadow:none;background:transparent}
.topic.locked h3{color:var(--ink-2)}
.stamp{display:inline-block;font-family:var(--mono);font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--red);border:1.5px solid var(--red);border-radius:2px;padding:3px 9px;transform:rotate(-2.5deg);opacity:.75;margin-top:10px}
.locked-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.locked-grid .topic{margin-bottom:0;padding:16px 18px}
.locked-grid h3{font-size:1.1rem}
.locked-grid .t-desc{font-size:.85rem}

/* ---------- exercise page ---------- */
.exbar{display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.back{font-family:var(--mono);font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2);border:1px solid var(--rule);border-radius:2px;padding:6px 10px;background:var(--sheet)}
.back:hover{color:var(--ink);border-color:var(--ink)}
.ruler{flex:1;min-width:120px;height:14px;border:1px solid var(--ink);border-radius:2px;background:
  repeating-linear-gradient(90deg,transparent 0 9px,var(--rule) 9px 10px),var(--sheet);
  position:relative;overflow:hidden}
.ruler>div{position:absolute;inset:0;width:0;background:var(--cobalt);opacity:.85;transition:width .25s}
.exmeta{font-family:var(--mono);font-size:.78rem;color:var(--ink-2);white-space:nowrap}
.exmeta b{color:var(--ink)}

.qcard{background:var(--sheet);border:1.5px solid var(--ink);border-radius:2px;box-shadow:var(--shadow);padding:26px 28px}
@media(max-width:560px){.qcard{padding:20px 16px}}
.q-eyebrow{font-family:var(--mono);font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--cobalt);margin-bottom:10px}
.qtext{font-family:var(--serif);font-weight:600;font-size:1.45rem;line-height:1.3;margin-bottom:20px;text-wrap:balance}
.choices{display:flex;flex-direction:column}
.choice{display:flex;gap:14px;align-items:baseline;text-align:left;padding:12px 6px;border-top:1px solid var(--rule);transition:background .1s}
.choice:last-child{border-bottom:1px solid var(--rule)}
.choice:hover:not(:disabled){background:var(--cobalt-soft)}
.choice:hover:not(:disabled) .ch-letter{background:var(--cobalt);border-color:var(--cobalt);color:#fff}
.choice:disabled{cursor:default}
.ch-letter{font-family:var(--mono);font-size:.8rem;font-weight:600;border:1.5px solid var(--ink);border-radius:2px;min-width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;flex:none;transform:translateY(3px);transition:background .1s,border-color .1s,color .1s;background:var(--sheet)}
.choice.dim{opacity:.45}
.choice.picked-wrong{background:var(--red-soft)}
.choice.picked-wrong .ch-letter{background:var(--red);border-color:var(--red);color:#fff}
.choice.is-correct{background:var(--green-soft)}
.choice.is-correct .ch-letter{background:var(--green);border-color:var(--green);color:#fff}

.banner{margin-top:20px;border:1.5px solid;border-radius:2px;padding:14px 16px;font-size:.95rem}
.banner .b-label{font-family:var(--mono);font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;display:block;margin-bottom:4px}
.banner.good{border-color:var(--green);background:var(--green-soft)}
.banner.good .b-label{color:var(--green)}
.banner.bad{border-color:var(--red);background:var(--red-soft)}
.banner.bad .b-label{color:var(--red)}
.explain{margin-top:6px;color:var(--ink-2);font-size:.92rem}
.next-row{display:flex;gap:12px;margin-top:22px;flex-wrap:wrap}
.btn{font-family:var(--mono);font-size:.8rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;background:var(--ink);color:var(--paper);padding:12px 22px;border-radius:2px;box-shadow:3px 3px 0 rgba(31,41,51,.18);transition:transform .08s,box-shadow .08s}
.btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 rgba(31,41,51,.18)}
.btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(31,41,51,.18)}
.btn.ghost{background:var(--sheet);color:var(--ink);border:1.5px solid var(--ink)}

/* ---------- confusion matrix + odds chips ---------- */
.cm{display:grid;grid-template-columns:auto 1fr 1fr;gap:4px;margin-top:12px;max-width:420px}
.cm-cell{border:1px solid var(--rule);border-radius:2px;padding:6px 8px;text-align:center;font-variant-numeric:tabular-nums;font-weight:700;background:var(--sheet)}
.cm-cell span{display:block;font-family:var(--mono);font-size:.6rem;font-weight:400;color:var(--ink-3);letter-spacing:.04em;margin-top:1px}
.cm-head{border:none;background:none;font-family:var(--mono);font-size:.64rem;font-weight:400;color:var(--ink-2);text-align:right;align-self:center}
.cm-cell.cm-head{text-align:center}
.cm-tp{background:var(--green-soft);border-color:var(--green);color:var(--green)}
.cm-fn{background:var(--red-soft);border-color:var(--red);color:var(--red)}
.cm-fp{background:#FDF3E7;border-color:var(--c1);color:#a34a12}
.oddsrow{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:6px 0 12px}
.odds-chip{font-family:var(--mono);font-size:.78rem;border:1.5px solid var(--ink);border-radius:2px;padding:5px 10px;background:var(--sheet)}
.odds-prior{border-style:dashed;color:var(--ink-2)}
.odds-up{border-color:var(--c1);color:#a34a12;background:#FDF3E7}
.odds-down{border-color:var(--c0);color:var(--c0);background:var(--cobalt-soft)}

/* ---------- question exhibit ---------- */
.qfig{margin:0 0 20px}
.qfig-stage{padding:10px}
.qfig-cap{font-family:var(--mono);font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin-top:7px}

/* ---------- plain-English answer (shown above the lab when wrong) ---------- */
.plain{margin-top:14px;border:1.5px solid var(--green);border-radius:2px;background:var(--green-soft);padding:14px 16px}
.plain .p-label{font-family:var(--mono);font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--green);display:block;margin-bottom:6px}
.plain .p-answer{font-family:var(--serif);font-weight:600;font-size:1.08rem;line-height:1.35;margin-bottom:6px}
.plain p{font-size:.95rem;color:var(--ink-2)}

/* ---------- remember line ---------- */
.remember{margin-top:10px;border:1px dashed var(--ink);border-radius:2px;padding:9px 13px;font-size:.88rem;background:var(--sheet)}
.remember .r-tag{font-family:var(--mono);font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:var(--cobalt);margin-right:10px}
.remember b{font-family:var(--serif)}
.remember .r-formula{font-family:var(--mono);font-size:.8rem;color:var(--ink-2);display:block;margin-top:2px}

/* ---------- ground definitions primer ---------- */
.primer-title{font-family:var(--serif);font-weight:700;font-size:1.5rem;margin:2px 0 4px}
.primer-note{font-size:.93rem;color:var(--ink-2);margin-bottom:14px}
.terms{margin:0 0 6px;border-top:1.5px solid var(--ink)}
.term{display:block;padding:10px 2px 11px;border-bottom:1px solid var(--rule)}
.term dt{display:flex;align-items:baseline;gap:10px;margin-bottom:3px}
.term .term-no{font-family:var(--mono);font-size:.66rem;letter-spacing:.12em;color:var(--cobalt)}
.term .term-t{font-family:var(--serif);font-weight:600;font-size:1.02rem}
.term dd{margin:0 0 0 34px;font-size:.92rem;color:var(--ink-2);line-height:1.5}

/* ---------- quick check ---------- */
.checks{margin-top:18px;display:flex;flex-direction:column;gap:14px}
.check-card{border:1.5px solid var(--ink);border-radius:2px;background:var(--sheet);padding:14px 16px}
.check-label{font-family:var(--mono);font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--cobalt);margin-bottom:6px}
.check-q{font-weight:600;margin-bottom:10px}
.check-opts{display:flex;flex-direction:column}
.check-opt{display:flex;gap:10px;align-items:baseline;text-align:left;padding:8px 4px;border-top:1px solid var(--rule);font-size:.92rem}
.check-opt:last-child{border-bottom:1px solid var(--rule)}
.check-opt:hover:not(:disabled){background:var(--cobalt-soft)}
.check-opt:disabled{cursor:default}
.check-opt .co-mark{font-family:var(--mono);font-size:.8rem;min-width:18px;color:var(--ink-3)}
.check-opt.co-right{background:var(--green-soft)}
.check-opt.co-right .co-mark{color:var(--green);font-weight:700}
.check-opt.co-wrong{background:var(--red-soft)}
.check-opt.co-wrong .co-mark{color:var(--red);font-weight:700}
.check-opt.co-dim{opacity:.45}
.retry-note{font-family:var(--mono);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--red)}

/* ---------- report card ---------- */
.result-card{background:var(--sheet);border:1.5px solid var(--ink);border-radius:2px;box-shadow:var(--shadow);padding:34px 30px;text-align:center}
.result-card .r-eyebrow{font-family:var(--mono);font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--cobalt)}
.score-big{font-family:var(--serif);font-weight:700;font-size:4rem;line-height:1.1;margin:10px 0 2px;font-variant-numeric:tabular-nums}
.score-big small{font-size:1.6rem;color:var(--ink-3);font-weight:600}
.r-msg{color:var(--ink-2);max-width:48ch;margin:6px auto 0}
.r-best{font-family:var(--mono);font-size:.78rem;color:var(--green);margin-top:6px}
.dots{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin:22px auto;max-width:420px}
.dot-q{width:22px;height:22px;border-radius:2px;border:1px solid var(--ink);font-family:var(--mono);font-size:.6rem;display:inline-flex;align-items:center;justify-content:center}
.dot-q.ok{background:var(--green-soft);color:var(--green);border-color:var(--green)}
.dot-q.no{background:var(--red-soft);color:var(--red);border-color:var(--red)}

/* ---------- the figure (interactive lesson) ---------- */
.ws{margin-top:22px;background:var(--sheet);border:1.5px solid var(--ink);border-radius:2px;padding:0;overflow:hidden}
.ws-kicker{font-family:var(--mono);font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--paper);background:var(--ink);padding:7px 16px}
.ws-kicker::before{content:"⌖ ";color:var(--hilite)}
.ws-body{padding:18px 20px 20px}
.ws-title{font-family:var(--serif);font-weight:600;font-size:1.25rem;margin-bottom:6px}
.ws-world{color:var(--ink-2);font-size:.93rem;margin-bottom:16px;max-width:64ch}
.ws-stage{border:1px solid var(--rule);border-radius:2px;padding:12px;overflow-x:auto;background:
  linear-gradient(var(--grid) 1px,transparent 1px),
  linear-gradient(90deg,var(--grid) 1px,transparent 1px),
  var(--sheet);
  background-size:24px 24px}
.ws-stage svg{display:block;margin:0 auto;max-width:100%;height:auto}
.ws-knobrow{display:flex;align-items:center;gap:14px;margin-top:16px;flex-wrap:wrap}
.ws-knoblab{font-family:var(--mono);font-size:.78rem;font-weight:600;letter-spacing:.02em;white-space:nowrap}
.ws-knobrow input[type=range]{flex:1;min-width:140px;height:22px}
.ws-knobval{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:600;color:var(--cobalt);min-width:72px;text-align:right;font-size:.95rem}
.ws-dragme{font-family:var(--mono);font-size:.72rem;letter-spacing:.06em;color:var(--cobalt);margin-top:6px;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.ws-readout{margin-top:14px;border:1px solid var(--rule);border-left:4px solid var(--ink);border-radius:2px;padding:10px 14px;font-size:.98rem;background:var(--sheet)}
.ws-readout b{font-weight:700}
.ws-insight{margin-top:10px;border-radius:2px;padding:10px 14px;font-size:.92rem}
.ws-insight.tone-info{background:var(--cobalt-soft);border-left:4px solid var(--cobalt)}
.ws-insight.tone-warn{background:var(--red-soft);border-left:4px solid var(--red)}
.ws-insight.tone-wow{background:linear-gradient(transparent 8%,var(--hilite) 8% 88%,transparent 88%);border-left:4px solid var(--ink)}
.ws-revealbtn{display:none;margin-top:16px;font-family:var(--mono);font-size:.78rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;background:var(--cobalt);color:#fff;padding:11px 20px;border-radius:2px;box-shadow:3px 3px 0 rgba(36,71,197,.25)}
.ws-revealbtn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 rgba(36,71,197,.25)}
.ws-reveal{display:none;margin-top:14px;border:1.5px solid var(--cobalt);outline:1px solid var(--cobalt);outline-offset:3px;border-radius:2px;padding:16px 18px;background:var(--cobalt-soft)}
.ws-reveal-name{font-family:var(--serif);font-weight:700;font-size:1.15rem;color:var(--cobalt)}
.ws-reveal-formula{font-family:var(--mono);background:var(--sheet);border:1px solid var(--rule);border-radius:2px;padding:9px 13px;margin:10px 0;font-size:.88rem;overflow-x:auto;white-space:nowrap}
.ws-reveal p{color:var(--ink-2);font-size:.92rem}

/* ---------- shared widget furniture ---------- */
.legend{display:flex;gap:18px;justify-content:center;margin-top:10px;font-family:var(--mono);font-size:.72rem;color:var(--ink-2);flex-wrap:wrap}
.legend .sw{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;border:1px solid rgba(31,41,51,.35)}
.cdot{display:inline-block;width:10px;height:10px;border-radius:50%;margin:0 4px 0 2px;border:1px solid rgba(31,41,51,.35)}
.hbar-row{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:.85rem}
.hbar-name{width:130px;text-align:right;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--mono);font-size:.75rem}
.hbar-track{flex:1;background:var(--paper);border:1px solid var(--rule);border-radius:2px;height:20px;position:relative;overflow:hidden}
.hbar-fill{height:100%;display:flex}
.hbar-val{min-width:84px;font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:.75rem;color:var(--ink-2);white-space:nowrap}
.nearest-tag{font-family:var(--mono);font-size:.62rem;font-weight:700;color:var(--green);margin-left:6px;letter-spacing:.06em}
@media(max-width:560px){
  #app{padding:24px 14px 72px}
  .mast-eyebrow{font-size:.62rem;letter-spacing:.1em}
  .toc-dots{display:none}
  .toc-part{min-width:52px;font-size:.7rem}
  .toc-name{flex:1;font-size:1rem}
  .toc-meta{font-size:.7rem}
  .exbar{row-gap:10px}
  .exbar .ruler{order:3;flex-basis:100%}
  .exbar .exmeta{margin-left:auto}
  .qtext{font-size:1.25rem}
  .ws-body{padding:14px 12px 16px}
  .ws-stage{padding:8px}
  .ws-stage svg{width:100%}
  .ws-knobrow{gap:10px}
  .ws-knobval{min-width:56px;font-size:.88rem}
  .hbar-name{width:84px}
  .hbar-val{min-width:60px;font-size:.7rem}
  .legend{gap:10px}
  .plain .p-answer{font-size:1rem}
  .score-big{font-size:3rem}
}
</style>
</head>

<script src="data_hard.js"></script>
<script src="data_logreg.js"></script>
<script src="data_logreg2.js"></script>
<script src="data_logreg3.js"></script>
<script src="data_bayes.js"></script>
<script src="data_bayes2.js"></script>
<script src="data_bayes3.js"></script>
<script src="data_trees.js"></script>
<script src="data_trees2.js"></script>
<script src="data_trees3.js"></script>
<script src="data_svm.js"></script>
<script src="data_svm2.js"></script>
