<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DataSense — Learn Data Science by Doing</title>
<style>
:root{
  --bg:#10151f; --surface:#1a2233; --surface-2:#212b40; --line:#2c3a55;
  --ink:#e8ecf4; --ink-2:#9aa5b8; --ink-3:#6b7689;
  --c0:#3987e5; --c1:#c98500; --query:#9085e9;
  --good:#1baf7a; --bad:#e66767; --accent:#9085e9;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55;min-height:100vh}
#app{max-width:860px;margin:0 auto;padding:24px 16px 80px}
button{font:inherit;cursor:pointer;border:none;border-radius:10px}
h1,h2,h3{line-height:1.25}
.small{font-size:.85rem;color:var(--ink-2)}

/* ---------- home ---------- */
.hero{padding:34px 0 10px;text-align:center}
.hero h1{font-size:2rem;background:linear-gradient(90deg,#7fb4f5,#b6adf7);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero p{color:var(--ink-2);margin-top:8px;max-width:560px;margin-left:auto;margin-right:auto}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-top:26px}
.topic{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px;text-align:left}
.topic.locked{opacity:.45}
.topic .t-emoji{font-size:1.6rem}
.topic h3{margin:8px 0 4px}
.topic .soon{display:inline-block;margin-top:10px;font-size:.75rem;color:var(--ink-3);border:1px solid var(--line);border-radius:99px;padding:2px 10px}
.levels{display:flex;flex-direction:column;gap:10px;margin-top:14px}
.level-btn{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;color:var(--ink);text-align:left;transition:transform .1s,border-color .1s}
.level-btn:hover:not(:disabled){transform:translateY(-1px);border-color:var(--accent)}
.level-btn:disabled{opacity:.4;cursor:not-allowed}
.level-btn .lb-name{font-weight:600}
.level-btn .lb-blurb{font-size:.8rem;color:var(--ink-2)}
.level-btn .lb-best{font-size:.78rem;color:var(--ink-2);white-space:nowrap}

/* ---------- quiz ---------- */
.topbar{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.back{background:transparent;color:var(--ink-2);padding:6px 10px;border:1px solid var(--line);border-radius:8px}
.back:hover{color:var(--ink)}
.progress{flex:1;height:8px;background:var(--surface-2);border-radius:99px;overflow:hidden}
.progress>div{height:100%;background:linear-gradient(90deg,var(--c0),var(--accent));border-radius:99px;transition:width .25s}
.qmeta{font-size:.85rem;color:var(--ink-2);white-space:nowrap}
.qcard{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px}
.qcard .chip{display:inline-block;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2);border:1px solid var(--line);border-radius:99px;padding:3px 10px;margin-bottom:12px}
.qtext{font-size:1.12rem;font-weight:600;margin-bottom:16px}
.choices{display:flex;flex-direction:column;gap:9px}
.choice{background:var(--surface-2);border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:11px 14px;text-align:left;transition:border-color .1s,background .1s}
.choice:hover:not(:disabled){border-color:var(--accent)}
.choice:disabled{cursor:default}
.choice.picked-wrong{border-color:var(--bad);background:rgba(230,103,103,.12)}
.choice.is-correct{border-color:var(--good);background:rgba(27,175,122,.12)}
.choice.dim{opacity:.5}
.banner{margin-top:16px;border-radius:11px;padding:12px 14px;font-size:.95rem}
.banner.good{background:rgba(27,175,122,.12);border:1px solid rgba(27,175,122,.45)}
.banner.bad{background:rgba(230,103,103,.10);border:1px solid rgba(230,103,103,.4)}
.explain{margin-top:10px;color:var(--ink-2);font-size:.92rem}
.next-row{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.btn{background:var(--accent);color:#14121f;font-weight:600;padding:10px 20px;border-radius:10px}
.btn:hover{filter:brightness(1.1)}
.btn.ghost{background:transparent;color:var(--ink-2);border:1px solid var(--line)}
.btn.ghost:hover{color:var(--ink)}

/* ---------- results ---------- */
.result-card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:28px;text-align:center}
.score-big{font-size:3rem;font-weight:700;margin:8px 0}
.dots{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:18px 0}
.dot-q{width:16px;height:16px;border-radius:5px;font-size:0}
.dot-q.ok{background:var(--good)}.dot-q.no{background:var(--bad)}

/* ---------- widget (interactive lesson) ---------- */
.ws{margin-top:18px;background:var(--surface-2);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:14px;padding:18px}
.ws-kicker{font-size:.7rem;letter-spacing:.09em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:8px}
.ws-title{font-size:1.05rem;margin-bottom:6px}
.ws-world{color:var(--ink-2);font-size:.92rem;margin-bottom:14px}
.ws-stage{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px;overflow-x:auto}
.ws-stage svg{display:block;margin:0 auto;max-width:100%}
.ws-knobrow{display:flex;align-items:center;gap:12px;margin-top:14px;flex-wrap:wrap}
.ws-knoblab{font-size:.88rem;font-weight:600;white-space:nowrap}
.ws-knobrow input[type=range]{flex:1;min-width:140px;accent-color:var(--accent);height:22px}
.ws-knobval{font-variant-numeric:tabular-nums;font-weight:700;color:var(--accent);min-width:64px;text-align:right}
.ws-dragme{font-size:.78rem;color:var(--accent);margin-top:4px;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
.ws-readout{margin-top:12px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 14px;font-size:1rem}
.ws-readout b{font-weight:700}
.ws-insight{margin-top:10px;border-radius:10px;padding:10px 14px;font-size:.92rem;border:1px solid var(--line)}
.ws-insight.tone-info{background:rgba(57,135,229,.10);border-color:rgba(57,135,229,.4)}
.ws-insight.tone-warn{background:rgba(201,133,0,.12);border-color:rgba(201,133,0,.5)}
.ws-insight.tone-wow{background:rgba(144,133,233,.14);border-color:var(--accent)}
.ws-revealbtn{display:none;margin-top:14px;background:linear-gradient(90deg,#7fb4f5,#b6adf7);color:#14121f;font-weight:700;padding:10px 18px;border-radius:10px}
.ws-reveal{display:none;margin-top:12px;background:rgba(144,133,233,.10);border:1px solid var(--accent);border-radius:12px;padding:14px 16px}
.ws-reveal-name{font-weight:700;font-size:1.05rem;color:var(--accent)}
.ws-reveal-formula{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 12px;margin:8px 0;font-size:.92rem;overflow-x:auto}
.ws-reveal p{color:var(--ink-2);font-size:.92rem}
.legend{display:flex;gap:16px;justify-content:center;margin-top:8px;font-size:.82rem;color:var(--ink-2);flex-wrap:wrap}
.legend .sw{display:inline-block;width:10px;height:10px;border-radius:99px;margin-right:5px;vertical-align:baseline}
.cdot{display:inline-block;width:10px;height:10px;border-radius:99px;margin:0 4px 0 2px}
.hbar-row{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:.88rem}
.hbar-name{width:118px;text-align:right;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar-track{flex:1;background:var(--surface);border-radius:6px;height:20px;position:relative;overflow:hidden}
.hbar-fill{height:100%;border-radius:6px 0 0 6px;display:flex}
.hbar-val{min-width:74px;font-variant-numeric:tabular-nums;font-size:.84rem;color:var(--ink-2);white-space:nowrap}
.nearest-tag{font-size:.7rem;font-weight:700;color:var(--good);margin-left:6px}
@media(max-width:560px){.hbar-name{width:76px}}
</style>
</head>
<body>
<div id="app"></div>
<script src="widgets.js"></script>
<script src="data_easy.js"></script>
<script src="data_medium.js"></script>
<script src="data_hard.js"></script>
<script src="app.js"></script>
</body>
</html>
