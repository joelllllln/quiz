<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1F2933">
<title>DataSense — A Field Manual for Practical Machine Learning</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="DataSense">
<meta name="application-name" content="DataSense">
<link rel="stylesheet" href="fonts.css">
<style>
:root{
  --paper:#FBFBF7; --sheet:#FFFFFF; --grid:#E7EBEE; --rule:#D8DEE4;
  --ink:#1F2933; --ink-2:#5B6B7B; --ink-3:#8595A6;
  --cobalt:#2447C5; --cobalt-soft:#EBEFFC;
  --red:#D6402B; --red-soft:#FBEFED;
  --green:#008300; --green-soft:#EDF6ED;
  --hilite:#FFF3B0;
  --c0:#2a78d6; --c1:#eb6834; --query:#4a3aa7;
  --shadow:4px 4px 0 rgba(31,41,51,.10);
  --serif:'Zilla Slab',Rockwell,'Roboto Slab',serif;
  --sans:'IBM Plex Sans','Helvetica Neue',Arial,sans-serif;
  --mono:'IBM Plex Mono','SF Mono',Consolas,monospace;
}
:root[data-theme=dark]{
  --paper:#15171A; --sheet:#1D2126; --grid:#1E2226; --rule:#3A414A;
  --ink:#E8E6E0; --ink-2:#A9B1BB; --ink-3:#7C8590;
  --cobalt:#8CA2F2; --cobalt-soft:#232A44;
  --red:#F08672; --red-soft:#3A2320;
  --green:#77C577; --green-soft:#1F2E1F;
  --hilite:#4A4426;
  --shadow:4px 4px 0 rgba(0,0,0,.5);
}
/* the lab bench stays lit: widgets draw with fixed ink-on-white colours */
:root[data-theme=dark] .ws{--paper:#FBFBF7;--sheet:#FFFFFF;--grid:#E7EBEE;--rule:#D8DEE4;--ink:#1F2933;--ink-2:#5B6B7B;--ink-3:#8595A6;--cobalt:#2447C5;--cobalt-soft:#EBEFFC;--red:#D6402B;--red-soft:#FBEFED;--green:#008300;--green-soft:#EDF6ED;--hilite:#FFF3B0;background:#FFFFFF;color:#1F2933}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--sans);color:var(--ink);line-height:1.6;min-height:100vh;
  background:
    linear-gradient(var(--grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid) 1px,transparent 1px),
    var(--paper);
  background-size:24px 24px;
}
#app{max-width:780px;margin:0 auto;padding:36px 20px 96px}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
button:focus-visible,a:focus-visible{outline:2px solid var(--cobalt);outline-offset:2px}
input[type=range]{accent-color:var(--cobalt)}
.ws-knobrow input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;height:34px;cursor:pointer}
.ws-knobrow input[type=range]::-webkit-slider-runnable-track{height:4px;background:var(--rule);border-radius:2px}
.ws-knobrow input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:3px;background:var(--cobalt);border:2px solid var(--ink);margin-top:-10px;box-shadow:2px 2px 0 rgba(31,41,51,.2)}
.ws-knobrow input[type=range]::-moz-range-track{height:4px;background:var(--rule);border-radius:2px}
.ws-knobrow input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:3px;background:var(--cobalt);border:2px solid var(--ink)}
.mono{font-family:var(--mono)}
.small{font-size:.85rem;color:var(--ink-2)}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---------- masthead ---------- */
.masthead{margin-bottom:34px}
.mast-rules{border-top:3px solid var(--ink);border-bottom:1px solid var(--ink);height:6px;margin-bottom:18px}
.mast-eyebrow{font-family:var(--mono);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--cobalt);display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
.masthead h1{font-family:var(--serif);font-weight:700;font-size:clamp(2.4rem,7vw,3.4rem);line-height:1.05;margin:10px 0 8px;text-wrap:balance}
.mast-sub{color:var(--ink-2);max-width:56ch}
.mast-sub b{color:var(--ink)}
.mast-foot{border-top:1px solid var(--ink);margin-top:18px;padding-top:8px;font-family:var(--mono);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3)}

/* ---------- contents / topics ---------- */
.sec-label{font-family:var(--mono);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-2);margin:30px 0 12px;display:flex;align-items:center;gap:12px}
.sec-label::after{content:"";flex:1;border-top:1px solid var(--rule)}

/* ---------- daily 50 challenge ---------- */
.daily-card{display:flex;justify-content:space-between;align-items:stretch;gap:20px;flex-wrap:wrap;margin:22px 0 4px;background:var(--ink);color:var(--paper);border:1.5px solid var(--ink);border-radius:2px;box-shadow:var(--shadow);padding:20px 24px}
.daily-card.is-done{background:var(--green);border-color:var(--green)}
.daily-main{flex:1 1 260px;min-width:0}
.daily-eyebrow{font-family:var(--mono);font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;opacity:.75}
.daily-title{font-family:var(--serif);font-weight:700;font-size:1.9rem;line-height:1.05;margin:4px 0 6px}
.daily-prog{font-size:.9rem;opacity:.9;margin-bottom:12px}
.daily-bar{height:6px;background:rgba(251,251,247,.22);border-radius:99px;overflow:hidden}
.daily-bar>div{height:100%;background:var(--paper);border-radius:99px;transition:width .3s}
.daily-side{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.daily-stat{text-align:center;line-height:1.05}
.daily-stat .ds-num{display:block;font-family:var(--serif);font-weight:700;font-size:2.4rem;font-variant-numeric:tabular-nums}
.daily-stat .ds-lab{font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;opacity:.75}
.daily-card .btn.daily-go{background:var(--paper);color:var(--ink);box-shadow:3px 3px 0 rgba(0,0,0,.25)}
.daily-card .btn.daily-go[disabled]{opacity:.5;cursor:default;box-shadow:none}
.daily-card.is-done .btn.daily-go{background:var(--ink);color:var(--paper)}
.pwa-install{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:60;font-family:var(--mono);font-size:.74rem;letter-spacing:.06em;text-transform:uppercase;color:var(--paper);background:var(--ink);border:1.5px solid var(--ink);border-radius:99px;padding:11px 20px;box-shadow:4px 4px 0 rgba(31,41,51,.28);cursor:pointer}
.pwa-install:hover{background:var(--cobalt);border-color:var(--cobalt)}
@media(max-width:520px){.pwa-install{bottom:14px;font-size:.7rem;padding:10px 18px}}
.daily-btns{display:flex;flex-direction:column;gap:8px}
.daily-card .btn.daily-more{background:transparent;color:var(--paper);border:1px solid rgba(251,251,247,.5);box-shadow:none;font-size:.82rem;padding:8px 14px}
.daily-card .btn.daily-more:hover{border-color:var(--paper);background:rgba(251,251,247,.08)}
.daily-card .btn.daily-more[disabled]{opacity:.4;cursor:default}
.daily-card.is-done .btn.daily-more{border-color:rgba(251,251,247,.6)}
.daily-filters{display:flex;flex-direction:column;gap:8px;margin:2px 0 12px}
.filt-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filt-lab{font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;opacity:.7;width:44px;flex:none}
.filt-chip{font-family:var(--mono);font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;color:var(--paper);background:transparent;border:1px solid rgba(251,251,247,.4);border-radius:99px;padding:5px 12px;transition:background .1s,color .1s,border-color .1s}
.filt-chip:hover{border-color:var(--paper)}
.filt-chip.on{background:var(--paper);color:var(--ink);border-color:var(--paper);font-weight:600}
.daily-card.is-done .filt-chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
@media(max-width:520px){.daily-card{padding:16px 18px}.daily-side{width:100%;justify-content:space-between}.daily-title{font-size:1.6rem}.filt-lab{width:auto}}
/* masthead tools: theme + text size */
.mast-tools{display:inline-flex;gap:8px}
.mt-btn{font-family:var(--mono);font-size:.72rem;letter-spacing:.05em;padding:6px 12px;min-height:32px;border:1px solid var(--rule);border-radius:99px;color:var(--ink-2);background:var(--sheet)}
.mt-btn:hover{border-color:var(--ink);color:var(--ink)}
/* why-wrong: the learner's pick + collapsible full list */
.why-pick{margin:14px 0;padding:12px 16px;background:var(--red-soft);border-left:3px solid var(--red);border-radius:2px}
.why-pick .wp-opt{font-weight:600;margin:4px 0 2px}
.why-pick .wp-why{margin:0;color:var(--ink-2)}
.whywrap{margin:12px 0}
.why-toggle{font-family:var(--mono);font-size:.74rem;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-2);padding:8px 12px;border:1px dashed var(--rule);border-radius:2px;width:100%;text-align:left}
.why-toggle:hover{color:var(--ink);border-color:var(--ink)}
.wt-arrow{float:right}
.why-list{border:1px solid var(--rule);border-top:none;border-radius:0 0 2px 2px;padding:4px 14px}
.why-row{padding:10px 0;border-bottom:1px dashed var(--rule);position:relative}
.why-row:last-child{border-bottom:none}
.why-row .why-opt{font-weight:600;font-size:.92rem;line-height:1.4}
.why-row .why-reason{color:var(--ink-2);font-size:.9rem;line-height:1.45;margin-top:2px}
.why-mine{background:var(--red-soft);margin:0 -14px;padding:10px 14px}
.why-yours{font-family:var(--mono);font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:var(--red);display:block;margin-bottom:2px}
/* AI tutor (re-explain simpler/deeper) */
.eli5{margin:12px 0}
.eli5-btns{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.eli5-lab{font-family:var(--mono);font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3)}
.eli5-btn{font-family:var(--mono);font-size:.74rem;padding:5px 12px;border:1px solid var(--rule);border-radius:99px;color:var(--ink-2);background:var(--sheet)}
.eli5-btn:hover:not(:disabled){border-color:var(--cobalt);color:var(--cobalt)}
.eli5-btn:disabled{opacity:.5;cursor:default}
.eli5-out{margin-top:10px;padding:12px 16px;background:var(--cobalt-soft);border-left:3px solid var(--cobalt);border-radius:2px}
.eli5-tag{font-family:var(--mono);font-size:.64rem;letter-spacing:.08em;text-transform:uppercase;color:var(--cobalt);margin-bottom:4px}
.eli5-text{margin:0;line-height:1.55;white-space:pre-wrap}
.eli5-note{font-size:.85rem;color:var(--ink-2)}
/* type the term */
.type-def{margin:14px 0;padding:14px 16px;background:var(--sheet);border-left:3px solid var(--ink);border-radius:2px}
.type-deftext{margin:6px 0 0;line-height:1.55}
.type-formula{font-family:var(--mono);font-size:.8rem;color:var(--ink-2);margin-top:8px}
.type-lab{display:block;font-family:var(--mono);font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2);margin:16px 0 6px}
.type-form{display:flex;gap:10px;flex-wrap:wrap}
.type-in{flex:1;min-width:200px;font:inherit;padding:10px 14px;border:1.5px solid var(--ink);border-radius:2px;background:var(--sheet);color:var(--ink)}
.type-in:disabled{opacity:.6}
.type-result{margin-top:16px;padding:14px 16px;border-radius:2px}
.type-result.tr-good{background:var(--green-soft);border-left:3px solid var(--green)}
.type-result.tr-bad{background:var(--red-soft);border-left:3px solid var(--red)}
.tr-mark{font-family:var(--mono);font-size:.72rem;letter-spacing:.06em;text-transform:uppercase}
.tr-good .tr-mark{color:var(--green)}.tr-bad .tr-mark{color:var(--red)}
.tr-term{font-weight:700;font-size:1.1rem;margin:6px 0 2px}
/* matching + ordering */
.match-cols{display:grid;grid-template-columns:2fr 3fr;gap:10px;margin:14px 0 6px}
@media(max-width:560px){.match-cols{grid-template-columns:1fr 1.4fr}}
.match-terms,.match-defs{display:flex;flex-direction:column;gap:8px;min-width:0}
.match-item{text-align:left;padding:10px 12px;border:1.5px solid var(--rule);border-radius:2px;background:var(--sheet);font-size:.86rem;line-height:1.4;transition:border-color .12s, opacity .12s;min-width:0;overflow-wrap:anywhere;word-break:break-word}
.mi-term{font-weight:600}
.match-item:hover:not(:disabled){border-color:var(--ink)}
.mi-sel{border-color:var(--cobalt);box-shadow:0 0 0 1.5px var(--cobalt)}
.mi-done{border-color:var(--green);background:var(--green-soft);opacity:.75}
.mi-shake{animation:mishake .3s}
@keyframes mishake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.match-note{font-size:.85rem;color:var(--ink-2)}
.order-title{font-family:var(--serif);font-size:1.3rem;margin:4px 0 6px}
.order-list{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.order-item{display:flex;gap:10px;align-items:flex-start;text-align:left;padding:11px 13px;border:1.5px solid var(--rule);border-radius:2px;background:var(--sheet);line-height:1.4}
.order-item:hover:not(.oi-done){border-color:var(--ink)}
.oi-no{font-family:var(--mono);font-weight:700;min-width:20px;color:var(--green)}
.oi-done{border-color:var(--green);background:var(--green-soft)}
/* compare pages */
.cmp-index{margin:14px 0 4px;background:var(--sheet);border:1.5px solid var(--ink);border-radius:2px;box-shadow:var(--shadow);padding:20px 24px}
.cmp-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.cmp-chip{font-family:var(--mono);font-size:.76rem;padding:7px 13px;border:1px solid var(--rule);border-radius:99px;background:var(--paper);color:var(--ink-2)}
.cmp-chip:hover{border-color:var(--ink);color:var(--ink)}
.cmp-title{font-family:var(--serif);font-size:1.5rem;margin:4px 0 2px}
.cmp-tagline{color:var(--ink-2);margin:0 0 14px}
.cmp-heads{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.cmp-head{padding:12px 14px;border-radius:2px}
.cmp-head b{display:block;font-size:1.05rem;margin-bottom:3px}
.cmp-head p{margin:0;font-size:.85rem;line-height:1.45;color:var(--ink-2)}
.cmp-a{background:var(--cobalt-soft);border-left:3px solid var(--cobalt)}
.cmp-b{background:#FBEEE7;border-left:3px solid #EB6834}
:root[data-theme=dark] .cmp-b{background:#3A2A20}
.cmp-row{margin-top:12px}
.cmp-dim{font-family:var(--mono);font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin-bottom:4px}
.cmp-cells{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cmp-cell{padding:9px 12px;background:var(--sheet);border:1px solid var(--rule);border-radius:2px;font-size:.88rem;line-height:1.45}
.cmp-ca{border-left:3px solid var(--cobalt)}
.cmp-cb{border-left:3px solid #EB6834}
.cmp-callout{margin-top:16px;padding:12px 16px;border-radius:2px}
.cmp-confusion{background:var(--red-soft);border-left:3px solid var(--red)}
.cmp-rule{background:var(--green-soft);border-left:3px solid var(--green)}
.cmp-callout p{margin:4px 0 0;line-height:1.5}
@media(max-width:520px){.cmp-heads,.cmp-cells{grid-template-columns:1fr}}
/* smart review topic filter */
.rev-topicrow{margin:10px 0 12px}
.rev-topic{font-family:var(--mono);font-size:.8rem;padding:7px 10px;border:1px solid var(--rule);border-radius:2px;background:var(--sheet);color:var(--ink);max-width:100%}
/* study notes */
.notes-card{margin:14px 0 4px;background:var(--sheet);border:1.5px solid var(--ink);border-radius:2px;box-shadow:var(--shadow);padding:20px 24px}
.notes-chips{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 4px}
.note-chip{text-align:left}
.notes-card-read .notes-h{font-family:var(--serif);font-size:1.6rem;margin:2px 0 6px}
.notes-intro{color:var(--ink-2);line-height:1.5;margin:0 0 14px}
.notes-jumprow{display:flex;align-items:center;gap:8px;margin:0 0 18px;flex-wrap:wrap}
.notes-jump{font-family:var(--mono);font-size:.8rem;padding:7px 10px;border:1px solid var(--rule);border-radius:2px;background:var(--sheet);color:var(--ink);max-width:100%}
.note-group{margin:0 0 20px}
.note-group-h{font-family:var(--mono);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--cobalt);border-bottom:1px solid var(--rule);padding-bottom:5px;margin-bottom:10px}
.note-items{display:flex;flex-direction:column;gap:10px}
.note-item{border-left:3px solid var(--rule);padding:2px 0 2px 12px}
.ni-t{font-weight:700;font-size:.92rem;line-height:1.35}
.ni-d{color:var(--ink-2);line-height:1.5;font-size:.9rem;margin-top:2px;overflow-wrap:anywhere}
.ni-f{font-family:var(--mono);font-size:.78rem;color:var(--ink);background:var(--cobalt-soft);border-radius:2px;padding:3px 8px;margin-top:5px;display:inline-block;overflow-wrap:anywhere;max-width:100%}
@media(max-width:520px){.notes-card{padding:16px 18px}.notes-card-read .notes-h{font-size:1.4rem}}
/* read + recall (learn) mode */
.lr-item{border-left-width:4px;padding:8px 0 8px 16px;margin:10px 0 6px}
.lr-item .ni-t{font-size:1.12rem}
.lr-item .ni-d{font-size:1rem;color:var(--ink);margin-top:4px}
.lr-item .ni-f{font-size:.82rem;margin-top:8px}
.lr-recall{display:flex;flex-direction:column;gap:2px;border-left:4px solid var(--cobalt);background:var(--grid);border-radius:0 4px 4px 0;padding:8px 14px;margin:0 0 14px}
.lr-recall-tag{font-family:var(--mono);font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3)}
.lr-recall-t{font-family:var(--serif);font-size:1rem;font-weight:600;color:var(--ink)}
.learn-cardq .flash-stage{margin:12px auto}
.learn-cardq .flash-card{min-height:240px}
.learn-cardq .next-row{justify-content:center}
/* badges */
.badge-card{background:var(--sheet);border:1.5px solid var(--ink);border-radius:2px;box-shadow:var(--shadow);padding:20px 24px;margin:14px 0 4px}
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:12px}
.badge{display:flex;flex-direction:column;gap:2px;padding:12px;border:1px solid var(--rule);border-radius:2px;background:var(--paper)}
.badge .bd-icon{font-size:1.4rem}
.badge .bd-name{font-weight:700;font-size:.86rem}
.badge .bd-desc{font-size:.74rem;color:var(--ink-2);line-height:1.35}
.badge .bd-prog{font-family:var(--mono);font-size:.68rem;color:var(--ink-3);margin-top:3px}
.bd-earned{border-color:var(--green);box-shadow:2px 2px 0 rgba(0,131,0,.15)}
.bd-locked{opacity:.55;filter:grayscale(.6)}
/* mastery ring */
.mm-ring{width:22px;height:22px;border-radius:50%;display:inline-grid;place-items:center;flex:none;margin-left:8px}
.mm-ring i{width:13px;height:13px;border-radius:50%;background:var(--sheet)}
/* difficulty pips (1-3) shown on every study item */
.lvl-pip{display:inline-block;font-family:var(--mono);font-size:.6rem;font-weight:700;letter-spacing:.02em;padding:1px 5px;border-radius:99px;vertical-align:middle;border:1px solid transparent;line-height:1.5}
.lvl-1{background:var(--green-soft);color:var(--green);border-color:var(--green)}
.lvl-2{background:#FFF3D6;color:#9A6A00;border-color:#C7A400}
.lvl-3{background:var(--red-soft);color:var(--red);border-color:var(--red)}
:root[data-theme=dark] .lvl-2{background:#3A3418;color:#E8C84A}
.study-avail{display:inline-block;font-family:var(--mono);font-size:.7rem;color:var(--paper);background:rgba(251,251,247,.16);border-radius:99px;padding:1px 8px;margin-left:4px}
.study-card .btn.study-go[disabled]{opacity:.4;cursor:not-allowed;box-shadow:none}
.flash-tag .lvl-pip,.flash-topictag .lvl-pip{margin-left:4px}
/* search grouping + keyboard nav */
.sr-group{font-family:var(--mono);font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);padding:9px 15px 3px;border-bottom:1px solid rgba(30,30,30,.08)}
.sr-active{background:var(--cobalt-soft);outline:1.5px solid var(--cobalt);outline-offset:-1.5px}
/* API key box at the top of home */
.apikey-card{margin:6px 0 2px;background:var(--sheet);border:1.5px solid var(--ink);border-radius:2px;box-shadow:var(--shadow);padding:14px 18px}
.apikey-card.ak-on{border-style:dashed;box-shadow:none;background:var(--green-soft);border-color:var(--green)}
.ak-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.ak-lead{flex:1 1 240px;min-width:0}
.ak-lead b{display:block;font-size:1rem}
.ak-note{display:block;font-size:.78rem;color:var(--ink-2);line-height:1.4;margin-top:2px}
.ak-state{font-weight:700;color:var(--green);font-family:var(--mono);font-size:.85rem}
.ak-form{display:flex;gap:8px;flex:1 1 260px;min-width:0}
.ak-in{flex:1;min-width:0;font-family:var(--mono);font-size:.85rem;padding:9px 12px;border:1.5px solid var(--ink);border-radius:2px;background:var(--paper);color:var(--ink)}
.ak-save{white-space:nowrap;min-height:40px}
.ak-btns{display:flex;gap:8px;flex-wrap:wrap}
@media(max-width:520px){.ak-form{flex-direction:column;flex-basis:100%}.ak-lead{flex-basis:100%}.ak-save,.ak-in{width:100%}}
/* search everything */
.search-card{margin:18px 0 4px;position:relative}
.search-in{width:100%;box-sizing:border-box;font-family:var(--mono);font-size:.95rem;padding:13px 16px;border:1.5px solid var(--ink);border-radius:2px;background:var(--sheet);color:var(--ink);box-shadow:var(--shadow)}
.search-in:focus{outline:none;box-shadow:4px 4px 0 rgba(0,0,0,.28)}
.search-in::placeholder{color:var(--muted);opacity:.8}
.search-results{margin-top:6px;background:var(--paper);border:1.5px solid var(--ink);border-radius:2px;box-shadow:var(--shadow);max-height:60vh;overflow-y:auto}
.sr-row{display:flex;flex-direction:column;gap:3px;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid rgba(30,30,30,.12);padding:11px 15px;cursor:pointer;font:inherit;color:var(--ink)}
.sr-row:last-child{border-bottom:none}
.sr-row:hover,.sr-row:focus{background:var(--sheet);outline:none}
.sr-q{font-size:.9rem;line-height:1.35}
.sr-meta{font-family:var(--mono);font-size:.68rem;letter-spacing:.03em;text-transform:uppercase;color:var(--muted)}
.sr-empty{padding:14px 15px;font-family:var(--mono);font-size:.8rem;color:var(--muted)}
/* single-concept lookup view */
.concept-card .q-eyebrow{font-family:var(--mono);font-size:.68rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.concept-answer{margin:14px 0;padding:14px 16px;background:var(--sheet);border-left:3px solid var(--ink);border-radius:2px}
.ca-lab{display:inline-block;font-family:var(--mono);font-size:.64rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.ca-text{font-weight:600;line-height:1.4}
.ca-simple{margin:8px 0 0;color:var(--muted);line-height:1.5}
/* unified study picker (shares the dark daily-card look) */
.study-card{display:flex;justify-content:space-between;align-items:stretch;gap:20px;flex-wrap:wrap;margin:22px 0 4px;background:var(--ink);color:var(--paper);border:1.5px solid var(--ink);border-radius:2px;box-shadow:var(--shadow);padding:20px 24px}
.study-card .btn.daily-go{background:var(--paper);color:var(--ink);box-shadow:3px 3px 0 rgba(0,0,0,.25)}
.study-topic{font-family:var(--mono);font-size:.78rem;padding:6px 10px;border:1px solid rgba(251,251,247,.4);border-radius:99px;background:var(--ink);color:var(--paper)}
@media(max-width:520px){.study-card{padding:16px 18px}}

/* ---------- smart review (adaptive) ---------- */
.review-card{margin:14px 0 4px;background:var(--sheet);border:1.5px solid var(--ink);border-radius:2px;box-shadow:var(--shadow);padding:20px 24px}
.review-eyebrow{font-family:var(--mono);font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--cobalt)}
.review-title{font-family:var(--serif);font-weight:700;font-size:1.6rem;line-height:1.05;margin:3px 0 12px}
.mast-badges{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.mast-badges .mb{font-family:var(--mono);font-size:.66rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2);border:1px solid var(--rule);border-radius:99px;padding:4px 11px}
.mast-badges .mb b{font-family:var(--serif);font-size:.9rem;color:var(--ink)}
.mast-badges .mb-learnt{border-color:var(--green);background:var(--green-soft)}
.mast-badges .mb-ready{border-color:#C7A400;background:rgba(199,164,0,.12)}
.mast-badges .mb-strug{border-color:var(--red);background:var(--red-soft)}
.mast-badges .mb-learning{border-color:var(--cobalt);background:var(--cobalt-soft)}
.dial-wrap{margin-bottom:16px}
.dial-ends{display:flex;justify-content:space-between;font-family:var(--mono);font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2);margin-bottom:4px}
.dial{width:100%;accent-color:var(--cobalt);height:30px}
.dial-read{font-size:.86rem;color:var(--ink-2);margin-top:6px}
.topic{background:var(--sheet);border:1.5px solid var(--ink);border-radius:2px;box-shadow:var(--shadow);padding:22px 24px;margin-bottom:18px}
.topic-head{display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap}
.topic h3{font-family:var(--serif);font-weight:600;font-size:1.45rem}
.topic .t-index{font-family:var(--mono);font-size:.72rem;letter-spacing:.12em;color:var(--ink-3)}
.topic .t-desc{color:var(--ink-2);margin-top:2px;font-size:.95rem}
.toc{margin-top:16px;display:flex;flex-direction:column}
.toc-row{display:flex;align-items:baseline;gap:10px;width:100%;padding:11px 2px;text-align:left;border-top:1px dashed var(--rule)}
.toc-row:hover:not(:disabled) .toc-name{color:var(--cobalt)}
.toc-row:hover:not(:disabled) .toc-go{transform:translateX(3px)}
.toc-row:disabled{cursor:not-allowed;opacity:.5}
.toc-part{font-family:var(--mono);font-size:.78rem;color:var(--ink-3);min-width:60px}
.toc-name{font-family:var(--serif);font-weight:600;font-size:1.05rem;transition:color .12s}
.toc-dots{flex:1;border-bottom:2px dotted var(--rule);transform:translateY(-4px);min-width:24px}
.toc-meta{font-family:var(--mono);font-size:.78rem;color:var(--ink-2);white-space:nowrap}
.toc-go{color:var(--cobalt);font-weight:600;transition:transform .12s}
.topic.locked{border-style:dashed;box-shadow:none;background:transparent}
.topic.locked h3{color:var(--ink-2)}
.stamp{display:inline-block;font-family:var(--mono);font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--red);border:1.5px solid var(--red);border-radius:2px;padding:3px 9px;transform:rotate(-2.5deg);opacity:.75;margin-top:10px}
.locked-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.locked-grid .topic{margin-bottom:0;padding:16px 18px}
.locked-grid h3{font-size:1.1rem}
.locked-grid .t-desc{font-size:.85rem}

/* ---------- exercise page ---------- */
.exbar{display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.back{font-family:var(--mono);font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2);border:1px solid var(--rule);border-radius:2px;padding:6px 10px;background:var(--sheet)}
.back:hover{color:var(--ink);border-color:var(--ink)}
.ruler{flex:1;min-width:120px;height:14px;border:1px solid var(--ink);border-radius:2px;background:
  repeating-linear-gradient(90deg,transparent 0 9px,var(--rule) 9px 10px),var(--sheet);
  position:relative;overflow:hidden}
.ruler>div{position:absolute;inset:0;width:0;background:var(--cobalt);opacity:.85;transition:width .25s}
.exmeta{font-family:var(--mono);font-size:.78rem;color:var(--ink-2);white-space:nowrap}
.exmeta b{color:var(--ink)}

.qcard{background:var(--sheet);border:1.5px solid var(--ink);border-radius:2px;box-shadow:var(--shadow);padding:26px 28px}
@media(max-width:560px){.qcard{padding:20px 16px}}
.q-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.q-eyebrow{font-family:var(--mono);font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--cobalt);margin-bottom:10px}
.fav-btn{flex:none;font-size:1.35rem;line-height:1;background:transparent;border:none;color:var(--ink-3);cursor:pointer;padding:0 2px;margin-top:-2px;transition:color .12s,transform .08s}
.fav-btn:hover{color:var(--cobalt)}
.fav-btn:active{transform:scale(.9)}
.fav-btn.is-fav{color:#E0A100}
.rate-ctl{display:inline-flex;align-items:center;gap:4px;flex:none;margin-left:auto}
.dis-btn{flex:none;font-size:1.05rem;line-height:1;background:transparent;border:none;cursor:pointer;padding:2px;margin-top:-2px;filter:grayscale(1);opacity:.4;transition:opacity .12s,transform .08s}
.dis-btn:hover{opacity:.75}
.dis-btn:active{transform:scale(.9)}
.dis-btn.is-dis{filter:none;opacity:1;transform:scale(1.08)}
.rate-row{display:flex;justify-content:flex-end;margin:2px 0 4px;min-height:24px}
.match-rate{display:flex;flex-wrap:wrap;gap:4px 16px;margin-top:16px;padding-top:12px;border-top:1px dashed var(--rule)}
.match-rate .mr-lab{width:100%;font-family:var(--mono);font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2)}
.mr-item{display:inline-flex;align-items:center;gap:2px;font-size:.82rem;color:var(--ink-2)}
.mr-item .fav-btn{font-size:1.05rem}
.mr-item .dis-btn{font-size:.9rem}
.dis-star{filter:grayscale(1)}
.rate-ask{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:16px;padding:10px 14px;border:1.5px dashed var(--rule);border-radius:2px}
.rate-ask .ra-lab{font-family:var(--mono);font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2)}
.rate-ask .btn{padding:6px 14px;font-size:.8rem}
.ra-skip{font-family:var(--mono);font-size:.7rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);background:transparent;border:none;cursor:pointer;text-decoration:underline;padding:4px}
.ra-skip:hover{color:var(--ink)}
.ra-done{font-family:var(--mono);font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2)}
.flash-view .rate-ask{margin-top:0}
.exbar .rate-ctl{margin-left:0}
.ct-meta .rate-ctl{margin-left:8px}
.skip-row{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}
.skip-row .nav-prev{margin-right:auto}
.match-nav{margin-top:14px}
/* hyperparameter guide */
.hp-chips{margin-top:10px}
.hp-row{margin-top:18px;padding-top:14px;border-top:1px solid var(--rule)}
.hp-head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.hp-name{font-family:var(--mono);font-weight:700;font-size:.95rem;color:var(--cobalt)}
.hp-def{font-family:var(--mono);font-size:.68rem;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3)}
.hp-txt{margin-top:6px;font-size:.92rem;color:var(--ink-2)}
.hp-txt b{font-family:var(--mono);font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);margin-right:4px}
.hp-txt span{color:var(--ink)}
.skip-btn{font-family:var(--mono);font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2);background:transparent;border:1px solid var(--rule);border-radius:99px;padding:7px 15px;cursor:pointer;transition:color .1s,border-color .1s}
.skip-btn:hover{color:var(--ink);border-color:var(--ink)}
.fav-card{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin:14px 0 4px;background:var(--sheet);border:1.5px solid var(--ink);border-radius:2px;box-shadow:var(--shadow);padding:16px 24px}
.fav-info{display:flex;align-items:center;gap:14px}
.fav-star{font-size:1.5rem;color:#E0A100;line-height:1}
.fav-title{font-family:var(--serif);font-weight:600;font-size:1.2rem}
.fav-sub{font-family:var(--mono);font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2)}
/* mastery map */
.mastery-card{margin:14px 0 4px;background:var(--sheet);border:1.5px solid var(--ink);border-radius:2px;box-shadow:var(--shadow);padding:20px 24px}
.mm-sub{color:var(--ink-2);font-size:.9rem;margin-top:2px}.mm-sub b{color:var(--ink)}
.mm-legend{display:flex;gap:14px;flex-wrap:wrap;margin:10px 0 6px;font-family:var(--mono);font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2)}
.mm-legend span{display:flex;align-items:center;gap:5px}
.mm-dot{width:9px;height:9px;border-radius:2px;display:inline-block}
.mm-learnt{background:var(--green)}.mm-ready{background:#C7A400}.mm-learning{background:var(--cobalt)}.mm-strug{background:var(--red)}.mm-new{background:var(--rule)}
.mm-tally{display:flex;flex-wrap:wrap;gap:6px 14px;margin:8px 0 4px}
.mm-tally .mmc{font-size:.72rem}
.mm-list{display:flex;flex-direction:column;margin-top:4px}
.mm-row{display:flex;flex-direction:column;gap:6px;width:100%;text-align:left;padding:12px 2px;border-top:1px solid var(--rule);background:none}
.mm-row:hover .mm-name{color:var(--cobalt)}
.mm-empty-head{font-family:var(--mono);font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin:16px 0 0;padding-top:12px;border-top:1.5px solid var(--rule)}
.mm-row-empty{flex-direction:row;align-items:center;justify-content:space-between;gap:10px;padding:9px 2px;border-top:1px solid var(--grid)}
.mm-row-empty .mm-name{font-weight:500;font-size:.92rem;color:var(--ink-2)}
.mm-row-empty:hover .mm-name{color:var(--cobalt)}
.mm-empty-go{font-family:var(--mono);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--cobalt);white-space:nowrap;opacity:.75}
.mm-rowhead{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.mm-name{font-family:var(--serif);font-size:.98rem;font-weight:600}
.mm-counts{display:flex;flex-wrap:wrap;gap:3px 12px}
.mmc{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:.66rem;letter-spacing:.02em;color:var(--ink-2)}
.mm-bar{display:flex;height:10px;border-radius:99px;overflow:hidden;background:var(--grid)}
.mm-seg{display:block;height:100%}.mm-seg.mm-learnt{background:var(--green)}.mm-seg.mm-ready{background:#C7A400}.mm-seg.mm-learning{background:var(--cobalt)}.mm-seg.mm-strug{background:var(--red)}.mm-seg.mm-new{background:var(--rule)}
/* home: connect-Claude chip, three doors, progress strip */
.mt-btn.mt-on{border-color:var(--green);color:var(--green)}
.home-doors{display:flex;gap:4px;padding:4px;margin:20px 0 22px;background:var(--grid);border:1px solid var(--rule);border-radius:13px}
.door{flex:1;display:flex;align-items:center;justify-content:center;padding:10px 8px;min-height:42px;border:0;border-radius:9px;background:transparent;color:var(--ink-2);cursor:pointer;transition:background .15s,color .15s,box-shadow .15s}
.door:hover{color:var(--ink)}
.door-on{background:var(--sheet);color:var(--ink);box-shadow:0 1px 2px rgba(31,41,51,.14)}
.door-t{font-family:var(--serif);font-weight:700;font-size:1.02rem}
.door-s{display:none}
.progress-strip{margin:14px 0 2px}
.ps-toggle{display:flex;width:100%;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:10px 14px;border:1px solid var(--rule);border-radius:10px;background:var(--sheet);cursor:pointer;text-align:left}
.ps-chips{display:inline-flex;flex-wrap:wrap;gap:6px 12px;align-items:center}
.ps-streak{font-family:var(--mono);font-size:.74rem;font-weight:700;color:var(--ink)}
.ps-pill{font-family:var(--mono);font-size:.66rem;letter-spacing:.02em;text-transform:uppercase;color:var(--ink-2);display:inline-flex;align-items:center;gap:5px}
.ps-pill b{font-size:.82rem;color:var(--ink)}
.ps-pill::before{content:"";width:8px;height:8px;border-radius:2px;background:var(--rule)}
.ps-pill.mmc-learnt::before{background:var(--green)}.ps-pill.mmc-ready::before{background:#C7A400}.ps-pill.mmc-learning::before{background:var(--cobalt)}.ps-pill.mmc-strug::before{background:var(--red)}
.ps-more{font-family:var(--mono);font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;color:var(--cobalt);white-space:nowrap}
.sec-label.sec-sub{margin:16px 0 8px;color:var(--ink-3)}
.dash-head{display:flex;flex-wrap:wrap;gap:8px 14px;align-items:center;margin:16px 0 6px;padding:12px 14px;border:1px solid var(--rule);border-radius:10px;background:var(--sheet)}
.dash-hero{display:flex;gap:20px;align-items:center;margin:18px 0 0;padding:20px 18px;border:1px solid var(--rule);border-radius:16px;background:var(--sheet);box-shadow:var(--shadow)}
.dh-ringwrap{position:relative;flex:0 0 auto;width:132px;height:132px}
.ring-svg{display:block;width:132px;height:132px}
.ring-track{stroke:var(--grid)}
.ring-arc{stroke-linecap:butt}
.a-learnt{stroke:var(--green)}.a-ready{stroke:#C7A400}.a-learning{stroke:var(--cobalt)}.a-strug{stroke:var(--red)}.a-new{stroke:var(--rule)}
.dh-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.dh-pct{font-family:var(--serif);font-weight:700;font-size:2.15rem;line-height:1;color:var(--ink);font-variant-numeric:tabular-nums}
.dh-pctl{font-family:var(--mono);font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin-top:4px}
.dh-side{flex:1;display:flex;flex-direction:column;gap:14px;min-width:0}
.dh-stat b{display:block;font-family:var(--serif);font-weight:700;font-size:1.65rem;line-height:1;color:var(--ink);font-variant-numeric:tabular-nums}
.dh-stat span{display:block;font-family:var(--mono);font-size:.57rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin-top:4px}
.dh-stat.dh-streak b{color:#D98A2B}
.dh-legend{display:flex;flex-wrap:wrap;gap:7px 16px;margin:13px 3px 0}
.dh-leg{font-family:var(--mono);font-size:.66rem;letter-spacing:.02em;color:var(--ink-2);display:inline-flex;align-items:center;gap:6px}
.dh-leg b{color:var(--ink);font-weight:700}
.dash-sub2{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0 4px}
.dash-sub2 .ks{padding:11px 6px;text-align:center;border:1px solid var(--rule);border-radius:10px;background:var(--sheet)}
.dash-sub2 .ks-n{display:block;font-family:var(--serif);font-weight:700;font-size:1.2rem;color:var(--ink);font-variant-numeric:tabular-nums}
.dash-sub2 .ks-l{display:block;font-family:var(--mono);font-size:.52rem;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);margin-top:3px}
@media(max-width:380px){.dash-hero{gap:14px;padding:18px 14px}.dh-ringwrap,.ring-svg{width:116px;height:116px}.dh-stat b{font-size:1.45rem}}
/* settings modal */
.modal-back{position:fixed;inset:0;z-index:1000;background:rgba(15,20,26,.55);display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
.modal{width:100%;max-width:560px;margin:auto;background:var(--paper);border:1.5px solid var(--ink);border-radius:14px;box-shadow:0 18px 50px rgba(0,0,0,.35);overflow:hidden}
.modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px;border-bottom:1px solid var(--rule)}
.modal-title{font-family:var(--serif);font-size:1.3rem;font-weight:700;margin:0}
.modal-x{width:36px;height:36px;border-radius:8px;border:1px solid var(--rule);background:var(--sheet);color:var(--ink-2);font-size:1rem;cursor:pointer}
.modal-x:hover{border-color:var(--ink);color:var(--ink)}
.modal-body{padding:16px 18px;display:flex;flex-direction:column;gap:14px}
.modal-body .apikey-card,.modal-body .data-card{margin:0}
/* personal analytics + consistency */
.stats-card{background:var(--sheet);border:1.5px solid var(--ink);border-radius:2px;box-shadow:var(--shadow);padding:20px 24px;margin:4px 0}
.stat-tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:10px;margin:12px 0 6px}
.stat-tile{background:var(--paper);border:1px solid var(--rule);border-radius:3px;padding:12px 10px;text-align:center}
.stat-tile .st-num{display:block;font-family:var(--serif);font-weight:700;font-size:1.5rem;line-height:1.05;font-variant-numeric:tabular-nums}
.stat-tile .st-lab{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-2)}
.stat-tile.st-streak{background:rgba(0,131,0,.08);border-color:var(--green)}.stat-tile.st-streak .st-num{color:var(--green)}
.stat-tile.st-good .st-num{color:var(--green)}
.heat-block{margin:18px 0 6px}

.wl-title{font-family:var(--serif);font-weight:600;font-size:1.2rem}

.write-view{display:flex;flex-direction:column;gap:14px;padding-top:6px}
.write-topic{align-self:flex-end;font-family:var(--mono);font-size:.78rem;padding:7px 10px;border:1.5px solid var(--ink);border-radius:2px;background:var(--sheet);color:var(--ink)}

.wr-score.sc-0,.wr-score.sc-1{color:var(--red)}.wr-score.sc-4,.wr-score.sc-5{color:var(--green)}

.wr-edited{font-family:var(--mono);font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--green);font-weight:700}

.wr-keynote{font-size:.9rem;line-height:1.55;color:var(--ink-2);margin:6px 0 10px}
.wr-keyin{width:100%;box-sizing:border-box;font-family:var(--mono);font-size:.9rem;padding:10px 12px;border:1.5px solid var(--rule);border-radius:3px;background:var(--paper);color:var(--ink)}
.wr-keyin:focus{outline:none;border-color:var(--cobalt)}

.write-newset{align-self:center}
/* flashcard view */
.flash-view{display:flex;flex-direction:column;align-items:center;gap:16px;padding-top:6px}
.flash-topic{align-self:flex-end;font-family:var(--mono);font-size:.78rem;padding:7px 10px;border:1.5px solid var(--ink);border-radius:2px;background:var(--sheet);color:var(--ink)}
.flash-stage{width:100%;max-width:520px;perspective:1400px}
.flash-card{position:relative;width:100%;min-height:300px;transform-style:preserve-3d;transition:transform .5s;background:none;border:none;padding:0;cursor:pointer;display:block}
.flash-card.flipped{transform:rotateY(180deg)}
.flash-face{position:absolute;inset:0;-webkit-backface-visibility:hidden;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:34px 28px;border:1.5px solid var(--ink);border-radius:4px;box-shadow:var(--shadow);text-align:center}

.flash-hint{font-family:var(--mono);font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3)}

.flash-shuffle{font-family:var(--mono);font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2);background:transparent;border:1px solid var(--rule);border-radius:99px;padding:7px 15px;cursor:pointer}
.flash-shuffle:hover{color:var(--ink);border-color:var(--ink)}
/* backup / restore */
.data-card{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin:28px 0 8px;background:var(--paper);border:1px dashed var(--ink-3);border-radius:2px;padding:14px 20px}
.dc-text{display:flex;flex-direction:column;gap:2px;max-width:60ch}.dc-text b{font-family:var(--serif);font-size:1rem}.dc-text span{font-size:.84rem;color:var(--ink-2)}
.dc-btns{display:flex;gap:8px;flex-wrap:wrap}
.dc-btn{font-family:var(--mono);font-size:.74rem;letter-spacing:.06em;text-transform:uppercase;background:var(--sheet);color:var(--ink);border:1.5px solid var(--ink);border-radius:2px;padding:9px 14px;min-height:40px;cursor:pointer}

.qtext{font-family:var(--serif);font-weight:600;font-size:1.45rem;line-height:1.3;margin-bottom:20px;text-wrap:balance}

.next-row{display:flex;gap:12px;margin-top:22px;flex-wrap:wrap}

/* ---------- confusion matrix + odds chips ---------- */
.cm{display:grid;grid-template-columns:auto 1fr 1fr;gap:4px;margin-top:12px;max-width:420px}

.ws-revealbtn{display:none;margin-top:16px;font-family:var(--mono);font-size:.78rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;background:var(--cobalt);color:#fff;padding:11px 20px;border-radius:2px;box-shadow:3px 3px 0 rgba(36,71,197,.25)}

.ws-reveal-formula{font-family:var(--mono);background:var(--sheet);border:1px solid var(--rule);border-radius:2px;padding:9px 13px;margin:10px 0;font-size:.88rem;overflow-x:auto;white-space:nowrap}
.ws-reveal p{color:var(--ink-2);font-size:.92rem}

/* ---------- shared widget furniture ---------- */
.legend{display:flex;gap:18px;justify-content:center;margin-top:10px;font-family:var(--mono);font-size:.72rem;color:var(--ink-2);flex-wrap:wrap}
.legend .sw{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;border:1px solid rgba(31,41,51,.35)}
.cdot{display:inline-block;width:10px;height:10px;border-radius:50%;margin:0 4px 0 2px;border:1px solid rgba(31,41,51,.35)}
.hbar-row{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:.85rem}
.hbar-name{width:130px;text-align:right;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--mono);font-size:.75rem}
.hbar-track{flex:1;background:var(--paper);border:1px solid var(--rule);border-radius:2px;height:20px;position:relative;overflow:hidden}
.hbar-fill{height:100%;display:flex}
.hbar-val{min-width:84px;font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:.75rem;color:var(--ink-2);white-space:nowrap}
.nearest-tag{font-family:var(--mono);font-size:.62rem;font-weight:700;color:var(--green);margin-left:6px;letter-spacing:.06em}

  .ws-knobval{min-width:56px;font-size:.88rem}
  .hbar-name{width:84px}
  .hbar-val{min-width:60px;font-size:.7rem}

  .plain .p-answer{font-size:1rem}

/* ---- Mode switch (Data Science · Coding · FCA & Innovation) ---- */
.mode-tabs{display:flex;gap:4px;padding:4px;margin:18px 0 4px;background:var(--grid);border:1px solid var(--rule);border-radius:13px}
.mode-tab{flex:1;display:flex;align-items:center;justify-content:center;padding:10px 6px;min-height:46px;border:0;border-radius:9px;background:transparent;color:var(--ink-2);cursor:pointer;font-family:var(--serif);font-weight:700;font-size:.96rem;line-height:1.15;transition:background .15s,color .15s,box-shadow .15s}
.mode-tab:hover{color:var(--ink)}
.mode-on{background:var(--sheet);color:var(--ink);box-shadow:0 1px 2px rgba(31,41,51,.14),inset 0 -3px 0 var(--ink)}
/* ---- Coding mode ---- */
.code-intro{border:1px solid var(--rule);border-radius:3px;background:var(--sheet);padding:16px 18px;margin:16px 0 6px}
.code-intro-p{margin:6px 0 0;line-height:1.55}
.hiw-steps{list-style:none;margin:12px 0 0;padding:0;display:flex;flex-direction:column;gap:8px}
.hiw-step{display:flex;gap:11px;align-items:flex-start;border:1px solid var(--rule);border-radius:3px;background:var(--grid);padding:9px 12px}
.hiw-badge{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border:1.5px solid var(--ink);border-radius:50%;font-size:.74rem;font-weight:700;margin-top:2px;background:var(--sheet)}
.hiw-text b{display:block;font-size:.95rem;line-height:1.3}
.hiw-sub{display:block;color:var(--ink-2);font-size:.86rem;line-height:1.45;margin-top:1px}
.hiw-tip{margin:11px 0 0;color:var(--ink-2);font-size:.86rem;line-height:1.5}
.code-intro-count{color:var(--ink-2);font-size:.85rem;align-self:center;white-space:nowrap}
.code-progwrap{display:flex;align-items:center;gap:12px;margin:12px 0 2px}
.code-progbar{flex:1;height:8px;border-radius:6px;background:var(--grid);border:1px solid var(--rule);overflow:hidden}
.code-progbar span{display:block;height:100%;background:var(--ink);border-radius:6px;transition:width .3s}
.code-group-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.cg-count{font-size:.72rem;letter-spacing:.06em;color:var(--ink-2);font-variant-numeric:tabular-nums}
.cg-full{color:var(--good,#2e7d32);font-weight:700}
.code-task{border:1px solid var(--rule);border-radius:3px;background:var(--sheet);padding:14px 16px;margin:10px 0}
.ct-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.ct-head h3{margin:0;font-size:1.05rem}
.ct-done{color:var(--good,#2e7d32);font-size:.8rem;font-weight:700}
.ct-ask{margin:6px 0 10px;color:var(--ink-2);line-height:1.45}
.ct-levels{display:flex;gap:8px;flex-wrap:wrap}
.ct-l{flex:1 1 40%;font-size:.85rem;padding:8px 10px;white-space:nowrap}
@media (min-width:560px){.ct-l{flex:1 1 auto}}
.ct-ok{border-color:var(--good,#2e7d32);color:var(--good,#2e7d32)}
.code-card .code-ask{font-size:1.12rem;margin:6px 0 4px}
.code-why{color:var(--ink-2);margin:0 0 12px;line-height:1.45}
.code-q{font-weight:600;margin:0 0 10px}
.code-opts{display:flex;flex-direction:column;gap:10px}
.code-opt{display:flex;gap:10px;align-items:flex-start;width:100%;text-align:left;border:1.5px solid var(--rule);border-radius:3px;background:var(--sheet);padding:10px 12px;cursor:pointer}
.code-opt:hover:not(:disabled){border-color:var(--ink)}
.code-opt pre{flex:1;overflow-x:auto;min-width:0}
.co-key{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border:1.5px solid var(--rule);border-radius:50%;font-size:.72rem;font-weight:700;color:var(--ink-2);margin-top:1px}
.co-right .co-key{border-color:var(--good,#2e7d32);color:var(--good,#2e7d32)}
.co-wrong .co-key{border-color:var(--bad,#c62828);color:var(--bad,#c62828)}
.code-opt pre,.code-line pre,.code-built,.code-sol pre{margin:0;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.82rem;line-height:1.5;white-space:pre;tab-size:4}
.co-right{border-color:var(--good,#2e7d32);box-shadow:inset 0 0 0 1px var(--good,#2e7d32)}
.co-wrong{border-color:var(--bad,#c62828);box-shadow:inset 0 0 0 1px var(--bad,#c62828)}
.code-built-wrap{margin:0 0 12px}
.cb-label{display:block;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2);margin-bottom:5px;font-variant-numeric:tabular-nums}
.code-built{min-height:2.6em;border:1.5px dashed var(--rule);border-radius:3px;background:var(--grid);padding:10px 12px;margin:0;overflow-x:auto}
.code-built:empty::before{content:'Tap the first line of the program below — it will appear here.';font-family:inherit;font-size:.85rem;color:var(--ink-2);white-space:normal}
.code-pool{display:flex;flex-direction:column;gap:8px}
.code-line{display:flex;gap:10px;align-items:flex-start;width:100%;text-align:left;border:1.5px solid var(--rule);border-radius:3px;background:var(--sheet);padding:8px 12px;cursor:pointer}
.code-line pre{flex:1;overflow-x:auto;min-width:0}
.code-line:hover:not(.cl-done){border-color:var(--ink)}
.cl-no{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border:1.5px dashed var(--rule);border-radius:50%;font-size:.72rem;font-weight:700;color:var(--ink-2)}
.cl-done{opacity:.5;cursor:default;background:var(--grid)}
.cl-done .cl-no{border-style:solid;border-color:var(--good,#2e7d32);color:var(--good,#2e7d32)}
.cl-decoy{border-color:var(--bad,#c62828);box-shadow:inset 0 0 0 1px var(--bad,#c62828)}
.code-write{width:100%;box-sizing:border-box;border:1.5px solid var(--rule);border-radius:3px;background:var(--sheet);color:var(--ink);padding:10px 12px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.85rem;line-height:1.5;resize:vertical;margin:4px 0 10px}
.code-write:focus{outline:none;border-color:var(--ink)}
.code-sol{margin-top:12px;border:1px solid var(--rule);border-radius:3px;background:var(--grid);padding:10px 12px;overflow-x:auto}
.code-after{margin-top:14px}

.code-walk{margin:8px 0 14px}
.cw-row{margin:0 0 12px}
.cw-line{margin:0;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.82rem;line-height:1.5;white-space:pre;overflow-x:auto;background:var(--grid);border:1px solid var(--rule);border-radius:3px;padding:8px 12px}
.cw-note{margin:5px 0 0;padding:0 0 0 12px;border-left:3px solid var(--rule);color:var(--ink-2);line-height:1.5;font-size:.92rem}
.cw-note-solo{margin-top:10px}
.ct-see{border-style:dashed}
/* Coding reference */
.cref-search{width:100%;box-sizing:border-box;margin-top:10px;padding:10px 12px;border:1.5px solid var(--rule);border-radius:3px;background:var(--sheet);color:var(--ink);font-size:.95rem}
.cref-search:focus{outline:none;border-color:var(--ink)}
.cref-item{border:1px solid var(--rule);border-radius:3px;background:var(--sheet);margin:8px 0}
.cref-item summary{display:flex;justify-content:space-between;align-items:baseline;gap:10px;padding:11px 14px;cursor:pointer;list-style:none}
.cref-item summary::-webkit-details-marker{display:none}
.cref-item summary::after{content:'+';color:var(--ink-2);font-weight:700;flex:0 0 auto}
.cref-item details[open] summary::after{content:'−'}
.cref-title{font-weight:700}
.cref-group{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.72rem;color:var(--ink-2)}
.cref-why{margin:0;padding:0 14px 8px;color:var(--ink-2);font-size:.9rem;line-height:1.45}
.cref-code{margin:0 14px 12px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.8rem;line-height:1.55;white-space:pre;overflow-x:auto;background:var(--grid);border:1px solid var(--rule);border-radius:3px;padding:10px 12px}
.cref-item .next-row{padding:0 14px 12px;margin:0}
.cref-imports .cref-code{margin-top:0}
